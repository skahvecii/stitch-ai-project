<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-white dark:bg-background-dark shadow-2xl">
<!-- Top App Bar -->
<div class="flex items-center p-4 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="flex items-center gap-2">
<div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-sm">radar</span>
</div>
<span class="font-bold text-lg tracking-tight">PriceRadar</span>
</div>
<div class="size-10"></div> <!-- Spacer for balance -->
</div>
<!-- Content Area -->
<div class="flex-1 overflow-y-auto px-6 py-4 flex flex-col items-center">
<!-- Illustration / Icon -->
<div class="w-24 h-24 bg-primary/10 dark:bg-primary/20 rounded-full flex items-center justify-center mb-8">
<span class="material-symbols-outlined text-primary text-5xl">shield_lock</span>
</div>
<!-- Header Section -->
<h1 class="text-2xl font-bold text-center mb-2">Two-Factor Authentication</h1>
<p class="text-slate-500 dark:text-slate-400 text-center text-sm px-4 leading-relaxed mb-10">
                Please enter the 6-digit code sent to your mobile device ending in <span class="font-semibold text-slate-900 dark:text-slate-100">•••• 42</span>
</p>
<!-- 6-Digit Code Input -->
<div class="flex justify-between w-full max-w-xs mb-8">
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary bg-transparent outline-none transition-all" maxlength="1" type="text" value="4"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary bg-transparent outline-none transition-all" maxlength="1" type="text" value="8"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary bg-transparent outline-none transition-all" maxlength="1" type="text" value="2"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary bg-transparent outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary bg-transparent outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center text-2xl font-bold border-b-2 border-slate-200 dark:border-slate-700 focus:border-primary dark:focus:border-primary bg-transparent outline-none transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
<!-- Resend Section -->
<div class="flex flex-col items-center gap-2 mb-10">
<p class="text-sm text-slate-500 dark:text-slate-400">Didn't receive the code?</p>
<button class="text-primary font-semibold text-sm flex items-center gap-1 hover:underline">
                    Resend in 0:45
                </button>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mb-8">
                Verify
                <span class="material-symbols-outlined text-lg">verified_user</span>
</button>
</div>
<!-- Custom Numeric Keypad (Optimized for Mobile Aesthetic) -->
<div class="bg-slate-50 dark:bg-slate-900/50 p-4 pb-8 border-t border-slate-100 dark:border-slate-800">
<div class="grid grid-cols-3 gap-2 max-w-xs mx-auto">
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">1</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">2</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">3</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">4</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">5</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">6</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">7</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">8</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">9</button>
<div class="h-14"></div>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">0</button>
<button class="h-14 flex items-center justify-center text-xl font-semibold hover:bg-slate-200 dark:hover:bg-slate-800 rounded-lg">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
<!-- Footer / Safety Indicator -->
<div class="py-2 flex items-center justify-center gap-1.5 opacity-40">
<span class="material-symbols-outlined text-xs">lock</span>
<span class="text-[10px] uppercase tracking-widest font-bold">Secure PriceRadar Encryption</span>
</div>
</div>
</body></html>
