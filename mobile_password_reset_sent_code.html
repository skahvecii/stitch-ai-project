<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>PriceRadar - Reset Link Sent</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="flex items-center bg-background-light dark:bg-background-dark p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_back</span>
</button>
<div class="flex-1 px-4">
<p class="text-center font-bold text-slate-900 dark:text-slate-100 uppercase tracking-widest text-xs">PriceRadar</p>
</div>
<div class="size-12"></div>
</div>
<div class="flex flex-col px-6 py-12 flex-1 items-center justify-center">
<div class="flex flex-col items-center gap-10 w-full max-w-md">
<div class="relative flex items-center justify-center">
<div class="absolute inset-0 bg-primary/10 rounded-full scale-150 blur-xl"></div>
<div class="relative bg-white dark:bg-slate-800 p-8 rounded-full shadow-xl">
<span class="material-symbols-outlined text-primary" style="font-size: 80px; font-variation-settings: 'FILL' 1;">mark_email_read</span>
</div>
</div>
<div class="flex flex-col items-center gap-4">
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight tracking-tight text-center">Email Sent!</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-relaxed text-center">
                        Check your inbox for a link to reset your password. If you don't see it, check your spam folder.
                    </p>
</div>
<div class="w-full space-y-4 pt-4">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-5 bg-primary text-white text-base font-bold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all">
<span class="truncate">Back to Login</span>
</button>
<div class="flex flex-col items-center gap-2">
<p class="text-slate-500 dark:text-slate-400 text-sm">Didn't receive the email?</p>
<button class="flex cursor-pointer items-center justify-center rounded-lg py-2 px-4 text-primary text-sm font-bold leading-normal hover:bg-primary/10 transition-colors">
<span class="truncate">Resend Email</span>
</button>
</div>
</div>
</div>
</div>
<div class="p-6 text-center text-slate-400 dark:text-slate-500 text-xs">
<p>© 2024 PriceRadar. Helping you save on every purchase.</p>
</div>
<div class="h-2 bg-primary"></div>
</div>
</body></html>
