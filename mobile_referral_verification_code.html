<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>PriceRadar - Referral Claim</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- Main Container (Mobile focused) -->
<div class="relative flex h-auto min-h-screen w-full max-w-md mx-auto flex-col bg-background-light dark:bg-background-dark overflow-x-hidden shadow-2xl">
<!-- Minimalist Header -->
<header class="flex items-center bg-background-light dark:bg-background-dark p-4 sticky top-0 z-10 border-b border-slate-200 dark:border-slate-800">
<div class="text-slate-900 dark:text-slate-100 flex size-10 shrink-0 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h1 class="text-primary text-xl font-bold leading-tight tracking-tight flex-1 text-center pr-10">PriceRadar</h1>
</header>
<!-- Progress Stepper -->
<div class="flex flex-col gap-3 p-6 bg-white dark:bg-slate-900/50">
<div class="flex gap-6 justify-between items-end">
<div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold">Verification</h2>
<p class="text-slate-500 dark:text-slate-400 text-xs">Identity &amp; Payment Details</p>
</div>
<p class="text-primary text-sm font-bold">Step 2 of 3</p>
</div>
<div class="h-2 w-full rounded-full bg-slate-200 dark:bg-slate-800">
<div class="h-2 rounded-full bg-primary" style="width: 66%;"></div>
</div>
</div>
<!-- Selected Reward Summary Card -->
<div class="p-4">
<div class="flex items-center justify-between gap-4 rounded-xl bg-white dark:bg-slate-900 p-4 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex flex-col gap-1">
<p class="text-slate-500 dark:text-slate-400 text-xs font-medium uppercase tracking-wider">Claiming Reward</p>
<p class="text-slate-900 dark:text-white text-xl font-bold leading-tight">$60.00 Payout</p>
<div class="flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-primary text-sm">account_balance_wallet</span>
<p class="text-primary text-sm font-semibold">PayPal Transfer</p>
</div>
</div>
<div class="size-16 bg-primary/10 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl">payments</span>
</div>
</div>
</div>
<!-- Verification Form -->
<div class="px-4 pb-8 flex flex-col gap-6">
<h3 class="text-slate-900 dark:text-slate-100 text-base font-bold leading-tight pt-2">Recipient Information</h3>
<div class="flex flex-col gap-4">
<!-- Full Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Full Name</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary px-4 py-3" placeholder="John Doe" type="text"/>
</div>
<!-- PayPal Email -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">PayPal Email Address</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary px-4 py-3" placeholder="name@example.com" type="email"/>
</div>
<!-- Confirm Email -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300 ml-1">Confirm PayPal Email</label>
<input class="w-full rounded-lg border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 focus:ring-primary focus:border-primary px-4 py-3" placeholder="name@example.com" type="email"/>
</div>
<!-- Checkbox -->
<div class="flex gap-3 items-start mt-2">
<div class="flex h-5 items-center">
<input class="size-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary" type="checkbox"/>
</div>
<label class="text-xs text-slate-600 dark:text-slate-400 leading-tight">
                        I confirm that the information above is accurate and I agree to the <a class="text-primary underline" href="#">Terms of Service</a> for reward distribution.
                    </label>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 mt-2">
<span>Verify &amp; Submit</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Security Badges -->
<div class="flex items-center justify-center gap-6 pt-4">
<div class="flex items-center gap-1.5 opacity-70">
<span class="material-symbols-outlined text-green-600 text-lg">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">Secure Session</span>
</div>
<div class="flex items-center gap-1.5 opacity-70">
<span class="material-symbols-outlined text-blue-600 text-lg">lock</span>
<span class="text-[10px] font-bold uppercase tracking-widest text-slate-500 dark:text-slate-400">256-Bit SSL</span>
</div>
</div>
</div>
<!-- Spacer for Bottom Nav -->
<div class="h-20"></div>
<!-- Bottom Navigation Bar -->
<div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-20">
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-slate-900/95 backdrop-blur-sm px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">home</span>
</div>
<p class="text-xs font-medium">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">card_giftcard</span>
</div>
<p class="text-xs font-bold">Rewards</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">account_circle</span>
</div>
<p class="text-xs font-medium">Profile</p>
</a>
</div>
</div>
</div>
</body></html>
