<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - PriceRadar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="flex items-center p-4 pb-2 justify-between">
<button class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Sign Up</h2>
</div>
<div class="@container">
<div class="@[480px]:px-4 @[480px]:py-3">
<div class="bg-cover bg-center flex flex-col justify-end overflow-hidden bg-primary/10 @[480px]:rounded-lg min-h-[180px] relative" data-alt="Modern retail shopping items with price tags" style='background-image: linear-gradient(180deg, rgba(28, 116, 233, 0.1) 0%, rgba(28, 116, 233, 0.6) 100%), url("https://lh3.googleusercontent.com/aida-public/AB6AXuBcr96HxQMCn2SeaxttyGajkj1PvUCJfnSqsT7Bpt0G2RmN56nquEMPLz6auBSyCCa31ojNM3AmxhY9aYmkBUdoGros_dEKYZ8hc6xT6oGZYi_H6XxeN9gyLkjqI-xhZHwwW63Pic70JkWURD8tX17iKvvqBSeIUvQQW7n8e6B983WynSwjj8NJW0naCQVvWwwRrXW3ozvU_6bXsPiia2sYxrllDJiwv-d36GdOdDGD-86FdzxEOwosJqohsH8LXtzldE0euYVBPAKd");'>
<div class="flex p-4">
<p class="text-white tracking-tight text-[32px] font-bold leading-tight">PriceRadar</p>
</div>
</div>
</div>
</div>
<div class="px-4 pt-6 pb-2">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[28px] font-bold leading-tight text-center">Track prices, save favorites</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal pt-2 text-center">Start saving money on your favorite products today.</p>
</div>
<div class="flex justify-center">
<div class="flex flex-1 gap-3 max-w-[480px] flex-col items-stretch px-4 py-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-xl h-12 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal tracking-[0.015em] w-full shadow-sm">
<img alt="Google" class="w-5 h-5" data-alt="Google colorful logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZCOUf9cOfhVcQa_9pGuHAHCd62hNMdems_J_jiWS25-f-zkE_3BFDXEY4WEBJoQ73OYdldDsPtZFuafwbl4ASYLYGG3fcThIkfuAJ48D045sScgTd_1Nw7IUZcjgvqikRyIjOIoRaSBCz4yNkfJNtHoZtXT2wIsPu7CZKBBZn7LaZ1yW-pe9O0oQ1mUEKdYvn5NjSc8GroZiLHE97iLB9vqo0ZKHDx-py5nGgCqxoBMlgvzcydIdp6PRCdP6WqlVqcbNNC6FZn4gg"/>
<span class="truncate">Continue with Google</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center gap-3 overflow-hidden rounded-xl h-12 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal tracking-[0.015em] w-full shadow-sm">
<span class="material-symbols-outlined text-xl">ios</span>
<span class="truncate">Continue with Apple</span>
</button>
</div>
</div>
<div class="flex items-center gap-4 px-4 py-4 max-w-[480px] mx-auto w-full">
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
<span class="text-slate-400 text-xs font-bold uppercase tracking-wider">or email</span>
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="flex flex-col gap-4 px-4 max-w-[480px] mx-auto w-full">
<div class="flex flex-col gap-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Email address</label>
<input class="flex h-12 w-full items-center justify-center overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none text-base" placeholder="hello@example.com" type="email"/>
</div>
<div class="flex flex-col gap-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Password</label>
<div class="relative">
<input class="flex h-12 w-full items-center justify-center overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 px-4 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-1 focus:ring-primary outline-none text-base" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-start gap-3 py-2">
<input class="mt-1 h-5 w-5 rounded border-slate-300 text-primary focus:ring-primary dark:bg-slate-800 dark:border-slate-700" id="terms" type="checkbox"/>
<label class="text-sm leading-relaxed text-slate-600 dark:text-slate-400" for="terms">
                    I agree to the <a class="text-primary font-semibold hover:underline" href="#">Terms of Service</a> and <a class="text-primary font-semibold hover:underline" href="#">Privacy Policy</a>
</label>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-4 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] w-full shadow-lg shadow-primary/20 mt-2">
<span class="truncate">Create Account</span>
</button>
</div>
<div class="flex flex-col items-center justify-center gap-4 py-8">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                Already have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Sign in</a>
</p>
</div>
<div class="h-10 bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
