<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PriceRadar - Claim Reward</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1c74e9",
                        "background-light": "#f6f7f8",
                        "background-dark": "#111821",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto bg-background-light dark:bg-background-dark">
<!-- Header -->
<div class="flex items-center p-4 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="p-2 hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
</button>
<h1 class="text-xl font-bold flex-1 text-center pr-10">Claim Reward</h1>
</div>
<!-- Progress Bar -->
<div class="px-6 py-4">
<div class="flex justify-between items-end mb-2">
<span class="text-sm font-semibold text-primary">Step 1 of 3</span>
<span class="text-xs text-slate-500 dark:text-slate-400 font-medium">Choose Method</span>
</div>
<div class="h-2 w-full bg-primary/20 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full w-1/3"></div>
</div>
</div>
<!-- Balance Card -->
<div class="px-6 py-4">
<div class="bg-gradient-to-br from-primary to-blue-600 rounded-xl p-6 shadow-lg shadow-primary/20 text-white">
<p class="text-sm font-medium opacity-90 mb-1">Available Balance</p>
<div class="flex items-baseline gap-1">
<span class="text-3xl font-bold">$124.50</span>
<span class="text-xs font-medium bg-white/20 px-2 py-0.5 rounded-full">+12% growth</span>
</div>
<div class="mt-4 flex items-center gap-2 text-xs opacity-80">
<span class="material-symbols-outlined text-sm">info</span>
<span>Ready for immediate withdrawal</span>
</div>
</div>
</div>
<!-- Reward Options -->
<div class="px-6 py-4 flex-1">
<h3 class="text-lg font-bold mb-4">Select Reward Method</h3>
<div class="space-y-4">
<!-- Cash Option -->
<label class="relative flex items-center p-4 bg-white dark:bg-slate-800 border-2 border-primary rounded-xl cursor-pointer shadow-sm">
<input checked="" class="hidden" name="reward_type" type="radio"/>
<div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary/10 text-primary mr-4">
<span class="material-symbols-outlined text-3xl">account_balance_wallet</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 dark:text-slate-100">Cash Transfer</p>
<p class="text-sm text-slate-500 dark:text-slate-400">PayPal or Direct Deposit</p>
</div>
<div class="flex h-6 w-6 items-center justify-center rounded-full border-2 border-primary">
<div class="h-3 w-3 rounded-full bg-primary"></div>
</div>
</label>
<!-- Gift Card Option -->
<label class="relative flex items-center p-4 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-primary/30 rounded-xl cursor-pointer shadow-sm transition-all">
<input class="hidden" name="reward_type" type="radio"/>
<div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary/10 text-primary mr-4">
<span class="material-symbols-outlined text-3xl">featured_seasonal_and_gifts</span>
</div>
<div class="flex-1">
<p class="font-bold text-slate-900 dark:text-slate-100">Digital Gift Card</p>
<p class="text-sm text-slate-500 dark:text-slate-400">Amazon, Apple, Starbucks</p>
</div>
<div class="flex h-6 w-6 items-center justify-center rounded-full border-2 border-slate-300 dark:border-slate-600">
<div class="h-3 w-3 rounded-full bg-transparent"></div>
</div>
</label>
<!-- Store Credit Option -->
<label class="relative flex items-center p-4 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-primary/30 rounded-xl cursor-pointer shadow-sm transition-all">
<input class="hidden" name="reward_type" type="radio"/>
<div class="flex h-12 w-12 items-center justify-center rounded-lg bg-primary/10 text-primary mr-4">
<span class="material-symbols-outlined text-3xl">add_card</span>
</div>
<div class="flex-1">
<div class="flex items-center gap-2">
<p class="font-bold text-slate-900 dark:text-slate-100">Store Credit</p>
<span class="text-[10px] font-bold bg-green-100 text-green-700 px-1.5 py-0.5 rounded uppercase">+5% Bonus</span>
</div>
<p class="text-sm text-slate-500 dark:text-slate-400">Add to PriceRadar balance</p>
</div>
<div class="flex h-6 w-6 items-center justify-center rounded-full border-2 border-slate-300 dark:border-slate-600">
<div class="h-3 w-3 rounded-full bg-transparent"></div>
</div>
</label>
</div>
</div>
<!-- Action Section -->
<div class="p-6 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/25 transition-all flex items-center justify-center gap-2">
                Continue to Details
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center text-xs text-slate-400 mt-4 px-4">
                By continuing, you agree to the PriceRadar Rewards terms and conditions.
            </p>
</div>
<!-- Bottom Navigation Bar (Mimicked from Component) -->
<div class="flex gap-2 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-4 pb-6 pt-3">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Home</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">sell</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Deals</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined text-2xl active-icon">card_giftcard</span>
<p class="text-[10px] font-bold uppercase tracking-wider">Rewards</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 dark:text-slate-500" href="#">
<span class="material-symbols-outlined text-2xl">person</span>
<p class="text-[10px] font-medium uppercase tracking-wider">Profile</p>
</a>
</div>
</div>
</body></html>
